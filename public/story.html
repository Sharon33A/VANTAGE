<body>

<div class="story-wrapper">

    <div class="story-intro">

        <span class="premium-label">
            PERSONAL REFLECTION
        </span>

        <h1>
            Let's Understand
            Your Situation
        </h1>

        <p>

            Express yourself freely in any language. There are no right or wrong answers.

        </p>

    </div>

    <div class="story-card">

        <label>
            What should I call you?
        </label>

        <input
            id="name"
            type="text"
            placeholder="Your name">

    </div>

    <div class="story-card">

        <label>
            Tell me about your current situation.
        </label>

        <textarea
            id="situation"
            placeholder="What's happening in your life right now?">
        </textarea>

    </div>

    <div class="story-card">

        <label>
            What future are you hoping for?
        </label>

        <textarea
            id="goal"
            placeholder="Describe your dream future.">
        </textarea>

    </div>

    <div class="story-card">

        <label>
            What is stopping you today?
        </label>

        <textarea
            id="challenge"
            placeholder="Fear, money, skills, family pressure, confusion...">
        </textarea>

    </div>

    <div class="story-card">

        <label>
            Any additional thoughts?
        </label>

        <textarea
            id="extra"
            placeholder="Anything else you want Vantage to know?">
        </textarea>

    </div>

    <div class="story-center">

        <button
            class="hero-button"
            onclick="generateFuture()">

            Explore My Futures

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
