<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Your Progress Journey</h1>

    <p>Every completed step brings your future closer.</p>

    <div class="future-card">

        <h2>Week 1</h2>
        <input type="checkbox"> Complete 5 study sessions

    </div>

    <div class="future-card">

        <h2>Week 2</h2>
        <input type="checkbox"> Complete mock test

    </div>

    <div class="future-card">

        <h2>Week 3</h2>
        <input type="checkbox"> Improve weak subjects

    </div>

    <div class="future-card">

        <h2>Future Unlock</h2>

        <p>
            Complete your weekly goals to unlock more future memories.
        </p>

    </div>

    <button onclick="alert('Future Memory Unlocked!')">
        Unlock Future Memory
    </button>

</div>

</body>
</html>
